name: Build npm_ntlm docker image

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: actions/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: actions/login-action@v4
        with:
          username: ${{ secrets.PACKAGES_USER }}
          password: ${{ secrets.PACKAGES_TOKEN }}

      - name: Build and push
        uses: actions/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          no-cache: true
          tags: |
            docker.io/erp7441/npm_ntlm:${{ github.sha }}
            docker.io/erp7441/npm_ntlm:latest
